<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <radialGradient id="og-bg" cx="20%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#15181E"/>
      <stop offset="100%" stop-color="#06070A"/>
    </radialGradient>
    <radialGradient id="og-glow" cx="80%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#C6FF3D" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C6FF3D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="og-volt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9CFF1F"/>
      <stop offset="100%" stop-color="#E7FF8C"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#og-bg)"/>
  <rect width="1200" height="630" fill="url(#og-glow)"/>

  <!-- Logo mark -->
  <g transform="translate(80 80) scale(2.6)">
    <rect width="64" height="64" rx="16" fill="#0E1014" stroke="rgba(255,255,255,0.08)"/>
    <path d="M18 46 C 18 30, 26 22, 42 22 L 46 22" stroke="url(#og-volt)" stroke-width="6.5" stroke-linecap="round" fill="none"/>
    <path d="M22 34 L 36 34" stroke="url(#og-volt)" stroke-width="6.5" stroke-linecap="round" fill="none"/>
    <circle cx="46" cy="22" r="3.5" fill="#C6FF3D"/>
  </g>

  <!-- Wordmark -->
  <text x="280" y="160" font-family="Inter, sans-serif" font-weight="800" font-size="64" fill="white" letter-spacing="-3">
    Fit<tspan fill="#C6FF3D">Flow</tspan>
  </text>

  <!-- Headline -->
  <text x="80" y="380" font-family="Inter, sans-serif" font-weight="800" font-size="96" fill="white" letter-spacing="-5">Train smarter.</text>
  <text x="80" y="490" font-family="Inter, sans-serif" font-weight="800" font-size="96" fill="#C6FF3D" letter-spacing="-5">Move farther.</text>

  <!-- Subtext -->
  <text x="80" y="560" font-family="Inter, sans-serif" font-weight="500" font-size="32" fill="#8B92A3" letter-spacing="-1">
    AI form check · live coaching · weekly recap · unified wearable sync
  </text>
</svg>
