<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- No viewport-fit=cover: in the Android app, Capacitor's SystemBars then pads
         the WebView by the real system-bar sizes (Android 15+ forces edge-to-edge and
         env(safe-area-inset-*) is NOT reliable in WebViews — the white nav bar was
         covering the bottom dock). Browsers/PWA handle safe areas themselves. -->
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#06070A" />
    <!-- Warm up the TLS handshakes the app needs immediately after boot. -->
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://securetoken.googleapis.com" crossorigin />
    <!-- AI + billing: proxy/checkout functions (web) and direct Gemini (APK). -->
    <link rel="preconnect" href="https://us-central1-gen-lang-client-0893216108.cloudfunctions.net" crossorigin />
    <link rel="preconnect" href="https://generativelanguage.googleapis.com" crossorigin />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FitFlow" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="description" content="FitFlow — Train smarter. Move farther. AI-personalized workouts, nutrition, recovery, and community in one app." />
    <link rel="canonical" href="https://fitflow.com/" />
    <meta property="og:url" content="https://fitflow.com/" />
    <meta property="og:site_name" content="FitFlow" />
    <meta property="og:title" content="FitFlow — Train smarter. Move farther." />
    <meta property="og:description" content="The all-in-one AI fitness platform: workouts, nutrition, recovery, social. Built to replace the rest." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://fitflow.com/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FitFlow — Train smarter. Move farther." />
    <meta name="twitter:description" content="AI form check, live coaching, weekly recap, unified wearable sync." />
    <meta name="twitter:image" content="https://fitflow.com/og-image.svg" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Inter:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <title>FitFlow — Train smarter. Move farther.</title>
  </head>

    <div id="root"></div>

  </body>
</html>
