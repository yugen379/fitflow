name: Deploy

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install web deps
        run: npm ci --legacy-peer-deps

      - name: Build web
        env:
          VITE_GEMINI_PROXY_URL: ${{ secrets.VITE_GEMINI_PROXY_URL }}
          VITE_STRIPE_CHECKOUT_URL: ${{ secrets.VITE_STRIPE_CHECKOUT_URL }}
          VITE_STRIPE_PORTAL_URL: ${{ secrets.VITE_STRIPE_PORTAL_URL }}
          VITE_STRIPE_PRICE_MONTHLY: ${{ secrets.VITE_STRIPE_PRICE_MONTHLY }}
          VITE_STRIPE_PRICE_YEARLY: ${{ secrets.VITE_STRIPE_PRICE_YEARLY }}
          VITE_ALL_FEATURES_FREE: ${{ secrets.VITE_ALL_FEATURES_FREE }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
          VITE_APP_ENV: production
          VITE_APP_VERSION: ${{ github.ref_name }}
        run: npm run build

      - name: Install functions deps
        run: cd functions && npm ci

      - name: Build functions
        run: cd functions && npm run build

      - name: Deploy Hosting + Functions + Rules
        uses: w9jds/firebase-action@v14.10.1
        with:
          args: deploy --only hosting,functions,firestore:rules
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}

  android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Build the AAB on any version tag, or on a manual dispatch. NOT gated on the
    # `deploy` job so the AAB still builds if the Firebase deploy step has issues.
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    # Map the Play secret to an env var: the `secrets` context is NOT allowed in an
    # `if:` expression (using it there fails the whole workflow at startup), but
    # `env` is. This was the bug that made every Deploy run fail in 0s.
    env:
      PLAY_SA: ${{ secrets.PLAY_SERVICE_ACCOUNT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Build web
        env:
          VITE_GEMINI_PROXY_URL: ${{ secrets.VITE_GEMINI_PROXY_URL }}
          VITE_STRIPE_CHECKOUT_URL: ${{ secrets.VITE_STRIPE_CHECKOUT_URL }}
          VITE_STRIPE_PORTAL_URL: ${{ secrets.VITE_STRIPE_PORTAL_URL }}
          VITE_STRIPE_PRICE_MONTHLY: ${{ secrets.VITE_STRIPE_PRICE_MONTHLY }}
          VITE_STRIPE_PRICE_YEARLY: ${{ secrets.VITE_STRIPE_PRICE_YEARLY }}
          VITE_ALL_FEATURES_FREE: ${{ secrets.VITE_ALL_FEATURES_FREE }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
          VITE_APP_ENV: production
          VITE_APP_VERSION: ${{ github.ref_name }}
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Restore signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          # Match the working android-apk.yml exactly: keystore at android/ root,
          # storeFile resolved relative to the app module via '../', single password
          # for store+key, alias 'fitflow'. (Previous version wrote to android/app
          # with storeFile=app/... → resolved to android/app/app/... → not found.)
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/fitflow-release.keystore
          {
            echo "storeFile=../fitflow-release.keystore"
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
            echo "keyAlias=fitflow"
            echo "keyPassword=$ANDROID_KEYSTORE_PASSWORD"
          } > android/keystore.properties

      - name: Build signed AAB
        run: cd android && chmod +x gradlew && ./gradlew bundleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload to Play Console internal track
        if: ${{ env.PLAY_SA != '' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ env.PLAY_SA }}
          packageName: com.fitflow.app
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
