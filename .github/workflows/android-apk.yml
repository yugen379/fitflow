name: Build Android APK

# Builds an installable debug APK in the cloud — no local Android SDK needed.
# Trigger it from the GitHub "Actions" tab (Run workflow), or it runs on pushes to main.
# Download the APK from the run's "Artifacts" section, then sideload it on your phone.
#
# Optional repo Secrets (Settings → Secrets and variables → Actions):
#   GEMINI_API_KEY        → enables AI features (coach, AI label read, quick-add) in the APK
#   VITE_USDA_API_KEY     → richer food DB lookups (else the public DEMO_KEY is used)
#   GOOGLE_SERVICES_JSON  → base64 of android/app/google-services.json → enables push notifications
# The build works WITHOUT any of these (OFF/USDA scanner + the one-tap settings button still work).

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]
    tags: [ 'v*' ]          # pushing a tag like v1.0.0 publishes a permanent Release
    paths-ignore:
      - '**.md'

# Needed so the workflow's token can create a GitHub Release.
permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Write .env from secrets (optional — enables AI)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VITE_USDA_API_KEY: ${{ secrets.VITE_USDA_API_KEY }}
        run: |
          : > .env
          if [ -n "$GEMINI_API_KEY" ]; then echo "GEMINI_API_KEY=$GEMINI_API_KEY" >> .env; echo "AI key: set"; else echo "AI key: not set (AI tier will degrade to OFF/USDA + manual)"; fi
          if [ -n "$VITE_USDA_API_KEY" ]; then echo "VITE_USDA_API_KEY=$VITE_USDA_API_KEY" >> .env; fi

      - name: Build web assets
        run: npm run build

      - name: Write google-services.json from secret (optional — enables push)
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" | base64 -d > android/app/google-services.json
            echo "google-services.json: written (push enabled)"
          else
            echo "google-services.json: not provided (push notifications disabled in this APK)"
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Sync Capacitor → Android
        run: npx cap sync android

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up signing keystore (enables a signed RELEASE build)
        id: keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ] && [ -n "$ANDROID_KEYSTORE_PASSWORD" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/fitflow-release.keystore
            {
              echo "storeFile=../fitflow-release.keystore"
              echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
              echo "keyAlias=fitflow"
              echo "keyPassword=$ANDROID_KEYSTORE_PASSWORD"
            } > android/keystore.properties
            echo "signed=true" >> "$GITHUB_OUTPUT"
            echo "Keystore configured → building a SIGNED RELEASE APK (stable SHA-1, native Google sign-in works)"
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No ANDROID_KEYSTORE_BASE64 secret → falling back to a DEBUG APK. Native Google sign-in will NOT work in it (ephemeral signing key)."
          fi

      - name: Build APK
        id: build
        run: |
          cd android
          chmod +x gradlew
          if [ "${{ steps.keystore.outputs.signed }}" = "true" ]; then
            ./gradlew assembleRelease --no-daemon --stacktrace
            echo "apk=android/app/build/outputs/apk/release/app-release.apk" >> "$GITHUB_OUTPUT"
          else
            ./gradlew assembleDebug --no-daemon --stacktrace
            echo "apk=android/app/build/outputs/apk/debug/app-debug.apk" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload APK artifact (every build — 30-day download)
        uses: actions/upload-artifact@v4
        with:
          name: fitflow-apk
          path: ${{ steps.build.outputs.apk }}
          if-no-files-found: error
          retention-days: 30

      # --- Permanent Release (only when a vX.Y.Z tag is pushed) ---
      - name: Rename APK for the release
        if: startsWith(github.ref, 'refs/tags/')
        run: cp "${{ steps.build.outputs.apk }}" "fitflow-${{ github.ref_name }}.apk"

      - name: Publish APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: fitflow-${{ github.ref_name }}.apk
          fail_on_unmatched_files: true
          generate_release_notes: true
